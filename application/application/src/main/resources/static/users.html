<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoTracker | Users</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/auth.css" rel="stylesheet">
    <link href="/css/users.css" rel="stylesheet">
</head>
<body class="py-5 users-page">
<div class="container users-shell">
    <div id="page-alert" class="alert d-none mb-4" role="alert"></div>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <p class="text-uppercase text-success fw-semibold mb-2">EcoTracker Directory</p>
            <h1 class="h3 mb-1">Users</h1>
            <p id="users-subtitle" class="text-muted mb-0">Loading access details...</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary">Back to Home</a>
            <a href="/profile" class="btn btn-outline-secondary">My Profile</a>
            <form action="/logout" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-secondary">Log out</button>
            </form>
        </div>
    </div>

    <section class="users-panel p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap">
            <div>
                <p class="section-label mb-1">Access</p>
                <h2 class="h5 mb-0">Directory visibility</h2>
            </div>
            <div id="users-role-badge" class="badge rounded-pill text-bg-secondary">Loading...</div>
        </div>
        <p id="users-role-note" class="text-muted small mb-0 mt-3">Checking your permissions...</p>
    </section>

    <section class="users-panel p-4">
        <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-3">
            <div>
                <p class="section-label mb-1">Accounts</p>
                <h2 class="h5 mb-0">Registered users</h2>
            </div>
            <div id="users-count" class="text-muted small">Loading users...</div>
        </div>
        <div id="users-list" class="row g-3">
            <div class="col-12"><div class="border rounded-3 p-4 text-center text-muted">Loading users...</div></div>
        </div>
    </section>
</div>

<script src="/js/shared/utils.js"></script>
<script src="/js/shared/api.js"></script>
<script src="/js/auth/common.js"></script>
<script src="/js/auth/users.js"></script>
</body>
</html>
