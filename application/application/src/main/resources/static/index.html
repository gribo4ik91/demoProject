<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoTracker | Home</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p class="text-uppercase text-success fw-semibold mb-1">EcoTracker</p>
            <h1 class="h3 mb-0">Ecosystem workspace</h1>
        </div>
        <div id="auth-controls" class="d-none align-items-center gap-3">
            <span id="auth-user" class="text-muted small"></span>
            <a href="/profile" class="btn btn-outline-success btn-sm">My Profile</a>
            <form action="/logout" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-secondary btn-sm">Log out</button>
            </form>
        </div>
    </div>

    <div class="mb-4">
        <h1 class="mb-2">Track small ecosystems with a simple field log.</h1>
        <p class="text-muted mb-0">Create an ecosystem, open its dashboard, and record environmental activity over time.</p>
    </div>

    <div id="page-alert" class="alert d-none" role="alert"></div>

    <div class="card mb-4 shadow-sm border-0">
        <div class="card-body">
            <h5 class="card-title">Add New Ecosystem</h5>
            <form id="create-eco-form" onsubmit="submitEcosystem(event)">
                <div class="row">
                    <div class="col-md-4 mb-2">
                        <input type="text" class="form-control" id="eco-name" placeholder="Name" required>
                    </div>
                    <div class="col-md-4 mb-2">
                        <select class="form-select" id="eco-type" required>
                            <option value="FORMICARIUM">Formicarium</option>
                            <option value="FLORARIUM">Florarium</option>
                            <option value="INDOOR_PLANTS">Indoor Plants</option>
                            <option value="DIY_INCUBATOR">DIY Incubator</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-2">
                        <input type="text" class="form-control" id="eco-desc" placeholder="Description">
                    </div>
                    <div class="col-md-1 mb-2">
                        <button type="submit" class="btn btn-success w-100">Add</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h5 class="mb-0">My Ecosystems</h5>
                </div>
                <div class="card-body">
                    <div id="ecosystems-container" class="row">
                        <div class="text-muted">Loading ecosystems...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = async () => {
        await loadAuthStatus();
        await loadEcosystems();
    };

    async function loadAuthStatus() {
        try {
            const response = await fetch('/api/v1/auth/status');
            if (!response.ok) {
                return;
            }

            const status = await response.json();
            if (!status.enabled || !status.authenticated) {
                return;
            }

            const controls = document.getElementById('auth-controls');
            controls.classList.remove('d-none');
            controls.classList.add('d-flex');
            document.getElementById('auth-user').textContent = `Signed in as ${status.displayName || status.username}`;
        } catch (error) {
            console.error(error);
        }
    }

    async function loadEcosystems() {
        const container = document.getElementById('ecosystems-container');
        container.innerHTML = '<div class="text-muted">Loading ecosystems...</div>';

        try {
            const response = await fetch('/api/v1/ecosystems');
            if (!response.ok) {
                throw new Error('Failed to load ecosystems.');
            }

            const ecosystems = await response.json();
            hideAlert();

            if (ecosystems.length === 0) {
                container.innerHTML = `
                    <div class="col-12">
                        <div class="border rounded-3 p-4 text-center bg-light-subtle">
                            <h6 class="mb-2">No ecosystems yet</h6>
                            <p class="text-muted mb-0">Create your first ecosystem above to start tracking observations.</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = ecosystems.map(eco => `
                <div class="col-md-4 mb-3">
                    <div class="card h-100 border-success shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(eco.name)}</h5>
                            <h6 class="card-subtitle mb-2 text-muted">${escapeHtml(eco.type)}</h6>
                            <p class="card-text text-muted small mb-0">${escapeHtml(eco.description || 'No description provided yet.')}</p>
                        </div>
                        <div class="card-footer bg-transparent border-top-0">
                            <a href="ecosystem.html?id=${eco.id}" class="btn btn-outline-success w-100">Open Dashboard</a>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="border rounded-3 p-4 text-center bg-danger-subtle text-danger-emphasis">
                        Could not load ecosystems right now.
                    </div>
                </div>
            `;
            showAlert(error.message || 'Something went wrong while loading ecosystems.', 'danger');
        }
    }

    async function submitEcosystem(event) {
        event.preventDefault();
        const submitButton = event.submitter;
        const data = {
            name: document.getElementById('eco-name').value,
            type: document.getElementById('eco-type').value,
            description: document.getElementById('eco-desc').value
        };

        submitButton.disabled = true;

        try {
            const response = await fetch('/api/v1/ecosystems', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                const error = await response.json().catch(() => null);
                throw new Error(error?.message || 'Failed to create ecosystem.');
            }

            document.getElementById('create-eco-form').reset();
            showAlert('Ecosystem created successfully.', 'success');
            await loadEcosystems();
        } catch (error) {
            showAlert(error.message || 'Failed to create ecosystem.', 'danger');
        } finally {
            submitButton.disabled = false;
        }
    }

    function showAlert(message, type) {
        const alert = document.getElementById('page-alert');
        alert.className = `alert alert-${type}`;
        alert.textContent = message;
    }

    function hideAlert() {
        const alert = document.getElementById('page-alert');
        alert.className = 'alert d-none';
        alert.textContent = '';
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }
</script>
</body>
</html>
