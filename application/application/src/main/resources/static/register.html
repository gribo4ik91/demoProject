<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoTracker | Create Account</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/auth.css" rel="stylesheet">
    <link href="/css/register.css" rel="stylesheet">
</head>
<body class="auth-page auth-page-register d-flex align-items-center py-5">
<div class="container register-shell">
    <div id="page-alert" class="alert d-none mb-4" role="alert"></div>

    <div class="auth-card-base p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
                <p class="text-uppercase text-success fw-semibold mb-2">EcoTracker Account</p>
                <h1 class="h3 mb-2">Create a new user profile</h1>
                <p class="text-muted mb-0">The display name will be shown on the main page after login. The login field is used to sign in.</p>
            </div>
            <a href="/login" class="btn btn-outline-secondary">Back to Login</a>
        </div>

        <form id="register-form">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="register-display-name" class="form-label">Display name</label>
                    <input id="register-display-name" class="form-control" minlength="3" maxlength="60" required>
                </div>
                <div class="col-md-6">
                    <label for="register-username" class="form-label">Login</label>
                    <input id="register-username" class="form-control" minlength="3" maxlength="40" required>
                </div>
                <div class="col-md-6">
                    <label for="register-first-name" class="form-label">First name</label>
                    <input id="register-first-name" class="form-control" minlength="2" maxlength="60" required>
                </div>
                <div class="col-md-6">
                    <label for="register-last-name" class="form-label">Last name</label>
                    <input id="register-last-name" class="form-control" minlength="2" maxlength="60" required>
                </div>
                <div class="col-md-6">
                    <label for="register-email" class="form-label">Email</label>
                    <input id="register-email" type="email" class="form-control" maxlength="120" required>
                </div>
                <div class="col-md-6">
                    <label for="register-location" class="form-label">Location</label>
                    <input id="register-location" class="form-control" maxlength="80">
                </div>
                <div class="col-12">
                    <label for="register-bio" class="form-label">Bio</label>
                    <textarea id="register-bio" class="form-control" rows="4" maxlength="500"></textarea>
                </div>
                <div class="col-md-6">
                    <label for="register-password" class="form-label">Password</label>
                    <input id="register-password" type="password" class="form-control" minlength="6" maxlength="72" required>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mt-4">
                <p class="text-muted small mb-0">After registration you will be redirected back to login and can sign in with your login and password.</p>
                <button type="submit" class="btn btn-success px-4">Create Account</button>
            </div>
        </form>
    </div>
</div>

<script src="/js/shared/utils.js"></script>
<script src="/js/shared/api.js"></script>
<script src="/js/auth/common.js"></script>
<script src="/js/auth/register.js"></script>
</body>
</html>
