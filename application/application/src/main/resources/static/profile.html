<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoTracker | My Profile</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/auth.css" rel="stylesheet">
    <link href="/css/profile.css" rel="stylesheet">
</head>
<body class="auth-page auth-page-profile py-5">
<div class="container profile-shell">
    <div id="page-alert" class="alert d-none mb-4" role="alert"></div>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <p class="text-uppercase text-success fw-semibold mb-2">EcoTracker Profile</p>
            <h1 class="h3 mb-0">My profile</h1>
        </div>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary">Back to Home</a>
            <form action="/logout" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-secondary">Log out</button>
            </form>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="auth-side-panel p-4 h-100">
                <p class="small text-white-50 mb-2">Signed in profile</p>
                <h2 id="profile-display-name" class="h3 mb-2">Loading...</h2>
                <p id="profile-login" class="mb-3 text-white-50">Loading...</p>
                <p id="profile-created-at" class="small text-white-50 mb-0">Loading...</p>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="auth-card-base p-4 p-lg-5">
                <form id="profile-form">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="display-name" class="form-label">Display name</label>
                            <input id="display-name" class="form-control" minlength="3" maxlength="60" required>
                        </div>
                        <div class="col-md-6">
                            <label for="username" class="form-label">Login</label>
                            <input id="username" class="form-control" disabled>
                        </div>
                        <div class="col-md-6">
                            <label for="first-name" class="form-label">First name</label>
                            <input id="first-name" class="form-control" minlength="2" maxlength="60" required>
                        </div>
                        <div class="col-md-6">
                            <label for="last-name" class="form-label">Last name</label>
                            <input id="last-name" class="form-control" minlength="2" maxlength="60" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" maxlength="120" required>
                        </div>
                        <div class="col-md-6">
                            <label for="location" class="form-label">Location</label>
                            <input id="location" class="form-control" maxlength="80">
                        </div>
                        <div class="col-12">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea id="bio" class="form-control" rows="4" maxlength="500"></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mt-4">
                        <p class="text-muted small mb-0">Login and password stay unchanged here. This page updates only the visible profile fields.</p>
                        <button type="submit" class="btn btn-success px-4">Save Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="/js/shared/utils.js"></script>
<script src="/js/shared/api.js"></script>
<script src="/js/auth/common.js"></script>
<script src="/js/auth/profile.js"></script>
</body>
</html>
