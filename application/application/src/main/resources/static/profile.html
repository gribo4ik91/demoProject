<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EcoTracker | My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top right, rgba(93, 163, 119, 0.22), transparent 30%),
                linear-gradient(145deg, #f7fbf7 0%, #edf6ef 46%, #f4faf6 100%);
        }

        .profile-shell {
            max-width: 980px;
        }

        .profile-card,
        .profile-side {
            border: 0;
            border-radius: 1.25rem;
            box-shadow: 0 22px 50px rgba(47, 72, 59, 0.08);
        }

        .profile-side {
            background: linear-gradient(160deg, #214b3c 0%, #356b56 55%, #4d8f71 100%);
            color: #f6fbf8;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.96);
        }
    </style>
</head>
<body class="py-5">
<div class="container profile-shell">
    <div id="page-alert" class="alert d-none mb-4" role="alert"></div>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <p class="text-uppercase text-success fw-semibold mb-2">EcoTracker Profile</p>
            <h1 class="h3 mb-0">My profile</h1>
        </div>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary">Back to Home</a>
            <form action="/logout" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-secondary">Log out</button>
            </form>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="profile-side p-4 h-100">
                <p class="small text-white-50 mb-2">Signed in profile</p>
                <h2 id="profile-display-name" class="h3 mb-2">Loading...</h2>
                <p id="profile-login" class="mb-3 text-white-50">Loading...</p>
                <p id="profile-created-at" class="small text-white-50 mb-0">Loading...</p>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="profile-card p-4 p-lg-5">
                <form id="profile-form" onsubmit="saveProfile(event)">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="display-name" class="form-label">Display name</label>
                            <input id="display-name" class="form-control" minlength="3" maxlength="60" required>
                        </div>
                        <div class="col-md-6">
                            <label for="username" class="form-label">Login</label>
                            <input id="username" class="form-control" disabled>
                        </div>
                        <div class="col-md-6">
                            <label for="first-name" class="form-label">First name</label>
                            <input id="first-name" class="form-control" minlength="2" maxlength="60" required>
                        </div>
                        <div class="col-md-6">
                            <label for="last-name" class="form-label">Last name</label>
                            <input id="last-name" class="form-control" minlength="2" maxlength="60" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" maxlength="120" required>
                        </div>
                        <div class="col-md-6">
                            <label for="location" class="form-label">Location</label>
                            <input id="location" class="form-control" maxlength="80">
                        </div>
                        <div class="col-12">
                            <label for="bio" class="form-label">Bio</label>
                            <textarea id="bio" class="form-control" rows="4" maxlength="500"></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mt-4">
                        <p class="text-muted small mb-0">Login and password stay unchanged here. This page updates only the visible profile fields.</p>
                        <button type="submit" class="btn btn-success px-4">Save Profile</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = loadProfile;

    async function loadProfile() {
        try {
            const response = await fetch('/api/v1/auth/profile');
            if (!response.ok) {
                throw new Error('Could not load profile.');
            }

            const profile = await response.json();
            fillProfile(profile);
            hideAlert();
        } catch (error) {
            showAlert(error.message || 'Could not load profile.', 'danger');
        }
    }

    async function saveProfile(event) {
        event.preventDefault();
        const button = event.submitter;
        const payload = {
            displayName: document.getElementById('display-name').value.trim(),
            firstName: document.getElementById('first-name').value.trim(),
            lastName: document.getElementById('last-name').value.trim(),
            email: document.getElementById('email').value.trim(),
            location: document.getElementById('location').value.trim() || null,
            bio: document.getElementById('bio').value.trim() || null
        };

        button.disabled = true;

        try {
            const response = await fetch('/api/v1/auth/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const error = await response.json().catch(() => null);
                throw new Error(error?.message || 'Could not update profile.');
            }

            const profile = await response.json();
            fillProfile(profile);
            showAlert('Profile updated successfully.', 'success');
        } catch (error) {
            showAlert(error.message || 'Could not update profile.', 'danger');
        } finally {
            button.disabled = false;
        }
    }

    function fillProfile(profile) {
        document.getElementById('profile-display-name').textContent = profile.displayName;
        document.getElementById('profile-login').textContent = `Login: ${profile.username}`;
        document.getElementById('profile-created-at').textContent = `Created: ${new Date(profile.createdAt).toLocaleString()}`;
        document.getElementById('display-name').value = profile.displayName;
        document.getElementById('username').value = profile.username;
        document.getElementById('first-name').value = profile.firstName;
        document.getElementById('last-name').value = profile.lastName;
        document.getElementById('email').value = profile.email;
        document.getElementById('location').value = profile.location || '';
        document.getElementById('bio').value = profile.bio || '';
    }

    function showAlert(message, type) {
        const alert = document.getElementById('page-alert');
        alert.className = `alert alert-${type}`;
        alert.textContent = message;
    }

    function hideAlert() {
        const alert = document.getElementById('page-alert');
        alert.className = 'alert d-none';
        alert.textContent = '';
    }
</script>
</body>
</html>
