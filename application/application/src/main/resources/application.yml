server:
  port: 8085

app:
  auth:
    enabled: ${APP_AUTH_ENABLED:true}
  response-delay:
    enabled: ${APP_RESPONSE_DELAY_ENABLED:true}
    min-ms: ${APP_RESPONSE_DELAY_MIN_MS:0}
    max-ms: ${APP_RESPONSE_DELAY_MAX_MS:5000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecotracker_db}
    username: ${DB_USERNAME:eco_user}
    password: ${DB_PASSWORD:eco_password}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
