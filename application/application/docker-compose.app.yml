version: '3'

services:
  app:
    container_name: ecotracker-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://ecotracker-postgres:5432/ecotracker_db
      DB_USERNAME: eco_user
      DB_PASSWORD: eco_password
      APP_AUTH_ENABLED: ${APP_AUTH_ENABLED:-true}
      APP_AUTH_DEFAULT_USER_ENABLED: ${APP_AUTH_DEFAULT_USER_ENABLED:-true}
      APP_RESPONSE_DELAY_ENABLED: ${APP_RESPONSE_DELAY_ENABLED:-false}
      APP_RESPONSE_DELAY_MIN_MS: ${APP_RESPONSE_DELAY_MIN_MS:-0}
      APP_RESPONSE_DELAY_MAX_MS: ${APP_RESPONSE_DELAY_MAX_MS:-5000}
    networks:
      - ecotracker-network

networks:
  ecotracker-network:
    name: ecotracker-network
